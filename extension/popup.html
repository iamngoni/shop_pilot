<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 14px -apple-system, system-ui, sans-serif; width: 280px; margin: 0; padding: 16px; color: #1a1a1a; }
      h1 { font-size: 15px; margin: 0 0 4px; }
      p { color: #666; margin: 0 0 12px; font-size: 12px; }
      input { width: 100%; box-sizing: border-box; padding: 10px; font-size: 18px; letter-spacing: 4px; text-align: center; border: 1px solid #ccc; border-radius: 8px; }
      button { width: 100%; margin-top: 10px; padding: 10px; font-size: 14px; font-weight: 600; color: #fff; background: #e2001a; border: 0; border-radius: 8px; cursor: pointer; }
      button:disabled { background: #ccc; }
      #status { margin-top: 10px; font-size: 13px; min-height: 18px; }
      .ok { color: #1a7f37; } .err { color: #cf222e; }
    </style>
  </head>
  <body>
    <h1>Connect to Shop Pilot</h1>
    <p>In your chat, send <b>connect</b> to get a code, then enter it below while signed in to checkers.co.za.</p>
    <input id="code" inputmode="numeric" maxlength="6" placeholder="000000" />
    <button id="go">Connect my session</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
